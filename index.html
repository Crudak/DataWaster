        let isWasting = false;

        let startTime = null;
        
        // 100MB test payload from Cloudflare

        async function wasteData() {
            while (isWasting) {

                        const { done, value } = await reader.read();

                            totalBytesWasted += value.length;
                            
                            // Calculate metrics
                            const elapsedSeconds = (Date.now() - startTime) / 1000;
                            const totalMB = totalBytesWasted / (1024 * 1024);
                            
                            // Mbps formula: (Total Bits / 1,000,000) / Elapsed Seconds

                startTime = Date.now();
                totalBytesWasted = 0;
